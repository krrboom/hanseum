<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한숨</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400&display=swap');

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --text: #e8e6e0;
      --muted: #6b6880;
      --accent: #a89cc8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    h1 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2.4rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }

    .chat-box {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      min-height: 300px;
      max-height: 480px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .message.user {
      align-self: flex-end;
      background: #222230;
      padding: 12px 16px;
      border-radius: 10px 10px 2px 10px;
      max-width: 80%;
      color: #d0cee8;
    }

    .message.assistant {
      align-self: flex-start;
      max-width: 90%;
      color: var(--text);
      padding: 4px 0;
    }

    .message.assistant::before {
      content: "한숨 —";
      display: block;
      font-size: 0.75rem;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }

    .input-row {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 10px;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      padding: 12px 16px;
      resize: none;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
      align-self: flex-end;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-state {
      color: var(--muted);
      font-size: 0.85rem;
      margin: auto;
      text-align: center;
      line-height: 2;
    }
  </style>
</head>
<body>
  <h1>한숨</h1>
  <p class="subtitle">잠깐 여기 털어놓고 가세요</p>

  <div class="chat-box" id="chatBox">
    <div class="empty-state" id="emptyState">
      오늘 어떤 하루였나요?<br/>무슨 말이든 괜찮아요.
    </div>
  </div>

  <div class="input-row">
    <textarea id="userInput" rows="2" placeholder="여기에 적어보세요…"></textarea>
    <button id="sendBtn" onclick="sendMessage()">보내기</button>
  </div>

  <script>
    const PROXY_URL = "/api/proxy";
    const history = [];

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const emptyState = document.getElementById("emptyState");

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      emptyState?.remove();

      appendMessage("user", text);
      history.push({ role: "user", content: text });
      userInput.value = "";
      sendBtn.disabled = true;

      const thinkingEl = appendMessage("assistant", "…");

      try {
        const res = await fetch(PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1024,
            system: "당신은 '한숨'이라는 이름의 조용하고 따뜻한 AI 상담사입니다. 사용자의 감정을 판단하지 않고 공감하며 들어줍니다. 짧고 진심 어린 말로 응답하세요. 한국어로 답하세요.",
            messages: history,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          thinkingEl.textContent = `오류: ${data.error?.message || res.status}`;
          return;
        }

        const reply = data.content?.[0]?.text ?? "(응답 없음)";
        thinkingEl.textContent = reply;
        history.push({ role: "assistant", content: reply });
      } catch (err) {
        thinkingEl.textContent = "연결에 실패했어요. 잠시 후 다시 시도해주세요.";
        console.error(err);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function appendMessage(role, text) {
      const el = document.createElement("div");
      el.className = `message ${role}`;
      el.textContent = text;
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
      return el;
    }
  </script>
</body>
</html>
